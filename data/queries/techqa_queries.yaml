  query: 'ODM 8.7 TeamServer users active authoring rules and they get kicked out
    - transaction timeout or session timeout?


    Some of my users are being kicked out of TeamServer while actively authoring rules.
    What value would be controlling this behavior? Session timeout is at it''s default
    30 minutes. Does transaction timeout come in to play here or is there a different
    setting that might be causing this. Thanks.'
  ground_truth_answer: 'If you perform time consuming operations in large repositories,
    you can increase the timeout value in the web.xml file of the RTS/DC EAR file
    (jrules-teamserver-<appserver>.ear\teamserver.war\WEB-INF) by changing the value
    of the property ilog.rules.teamserver.transaction.timeout.


    You will find the property in the file web.xml defined as below:

    ...

    <context-param>

    <description>Modify the timeout value that is associated with transactions (in
    seconds)</description>

    <param-name>ilog.rules.teamserver.transaction.timeout</param-name>

    <param-value>600</param-value>

    </context-param>'
  category: techqa
