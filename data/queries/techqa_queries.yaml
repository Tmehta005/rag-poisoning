  query: "How to create batches for bulk upload\n\nI am new in datacap 9.0 .I just\
    \ started developing with datacap studio and currently I have learned  to recognize,\
    \ capture and export the data into filenet.\n\nNow I want to Create batches of\
    \ image or pdf files so that I can process images and pdf .\n\n \n\nAs per requirement\
    \ client is sharing document at one shared location.I need to pickup all the documnets\
    \ from shared location. For creating batches which tool I should use? how it works?\n\
    \n \n\nCan anyone help how I proceed with this.\n\n \n\nRegards,\n\nChhaya Sahu"
  ground_truth_answer: "Set skipsamebatch for VScan tasks  1. Run Rulerunner Manager.\
    \ \n 2. On the Rulerunner tab, stop the service. \n 3. On the Rulerunner Login\
    \ tab, click Connect. \n 4. On the Workflow tab, expand the hierarchy on the right\
    \ and highlight VScan. \n 5. In the Settings section in the lower right, set skipsamebatch\
    \ to 1. \n 6. Highlight the line labeled <dbs> above VScan in the thread hierarchy.\
    \ \n 7. Set skipsamebatch to 1 there also. \n 8. Click Save, then go back to the\
    \ Rulerunner tab and start the service."
  category: techqa
