- query_id: techqa_0018
  query: 'Recurrent RES StaleConnectionException


    How to prevent rule execution failing because of recurrent StaleConnectionException
    on ODM 8.8 Rule Execution Server?'
  ground_truth_answer: "Configure the WebSphere Application Server data source connection\
    \ pool so as to eliminate occurrences of StaleConnectionException :\n\n    Set\
    \ the Minimum connections to 0 to avoid situations where a connection is kept\
    \ in the pool to meet the minimum requirement, even though it may have been idle\
    \ for longer than Unused timeout\n    Set the values for Unused timeout and Reap\
    \ timeout so that the sum does not exceed any network level idle connection timeout"
  category: techqa
- query_id: techqa_0019
  query: 'For HP-UX how to write verbose gc output to a log file other than the native_stdout?


    A customer asked why no gc logs generated even if they use the -Xverbosegc option.
    So How can I write verbose gc output to a log file other than the native_stdout
    for HP-UX?'
  ground_truth_answer: "Add the following parameters to the generic JVM arguments:\
    \ \n-XX:+PrintGCDetails \n-XX:+PrintGCDateStamps \n-XX:+PrintHeapAtGC \n-Xverbosegc:file=\
    \ /tmp/gc_pid$$.vgc"
