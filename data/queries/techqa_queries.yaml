- query_id: techqa_0014
  query: "No trace is logged in Decision Warehouse, and no records in EXECUTION_TRACES\
    \ table for a certain ruleset\n\nFor a certain ruleset, no trace is logged in\
    \ DW, and no records can be found in EXEUTION_TRACES table of DW database.\n\n\
    Server logs do not contain any messages about the execution traces for this ruleset.\n\
    \nThe issue reproduces only for this project. For other projects deployed in RES,\
    \ traces are being logged in DW. Also, the same project generates execution traces\
    \ in other environments.\n\nThe following properties have been set:\n\n     monitoring.enabled\
    \ = true\n     monitoring.filters = INFO_EXECUTION_DATE=true,INFO_EXECUTION_DURATION=true,INFO_TOTAL_TASKS_EXECUTED=true,INFO_TOTAL_RULES_NOT_FIRED=true,INFO_EXECUTION_EVENTS=true,INFO_TOTAL_TASKS_NOT_EXECUTED=true,INFO_TOTAL_RULES_FIRED=true,INFO_RULESET_PROPERTIES=true\n\
    \     ruleset.bom.enabled = false (for true value, the problem still occurs)\n\
    \     ruleset.sequential.trace.enabled = true\n     ruleset.trace.enabled = true\n\
    \nHow can I diagnose this issue?"
  ground_truth_answer: "If an issue arises during DW trace persistence at runtime,\
    \ the related messages and stack traces are only available programmatically through\
    \ the following API: ilog.rules.res.session.IlrSessionResponse.getWarnings() \n\
    \nSo it is possible for an error to remain silent if the warnings above are not\
    \ explicitly logged by the application."
  category: techqa
