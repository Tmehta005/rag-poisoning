# Cybersecurity evaluation queries — aligned to corpus documents.
#
# Corpus documents:
#   nist_cswp_29.pdf          — NIST Cybersecurity Framework 2.0 (CSF 2.0, Feb 2024)
#   nist_sp_800_53_rev5.pdf   — NIST SP 800-53 Rev 5 (Security and Privacy Controls)
#   nist_sp_800_61r3.pdf      — NIST SP 800-61 Rev 3 (Incident Handling Guide)
#   cisa_incident_response_playbooks.pdf — CISA Federal IR Playbooks
#
# Required fields: query_id, query, ground_truth_answer
# Optional fields: category, source_doc
# Attack blocks: not included yet — add after clean baseline is validated

- query_id: "q001"
  query: "What are the six core functions of the NIST Cybersecurity Framework 2.0?"
  ground_truth_answer: >
    NIST CSF 2.0 defines six core functions: Govern (GV), Identify (ID),
    Protect (PR), Detect (DE), Respond (RS), and Recover (RC). The Govern
    function is new in version 2.0 and provides the organizational context
    — strategy, expectations, and policy — that applies across all other
    functions. Each function is further divided into categories and
    subcategories that describe specific cybersecurity outcomes.
  category: "framework_structure"
  source_doc: "nist_cswp_29.pdf"

- query_id: "q002"
  query: "How does NIST CSF 2.0 use Current Profiles and Target Profiles?"
  ground_truth_answer: >
    A Current Profile in CSF 2.0 describes an organization's present
    cybersecurity posture — the outcomes it is currently achieving. A Target
    Profile describes the desired future state. By comparing the two, an
    organization identifies gaps and produces a prioritized action plan or
    roadmap to close them. Profiles can be used internally or shared with
    partners to communicate cybersecurity posture and requirements.
  category: "framework_structure"
  source_doc: "nist_cswp_29.pdf"

- query_id: "q003"
  query: "What does NIST SP 800-53 AC-2 require for account management?"
  ground_truth_answer: >
    AC-2 (Account Management) requires organizations to define and document
    the types of accounts allowed, establish conditions for account use,
    assign account managers, create and activate accounts following an
    approval process, monitor accounts for atypical usage, disable accounts
    when no longer needed or after a defined inactivity period, and notify
    managers when accounts are no longer required. It also requires
    alignment with personnel termination and transfer procedures.
  category: "access_control"
  source_doc: "nist_sp_800_53_rev5.pdf"

- query_id: "q004"
  query: "What does NIST SP 800-53 IA-5 require for authenticator management?"
  ground_truth_answer: >
    IA-5 (Authenticator Management) requires organizations to verify
    the identity of individuals before issuing authenticators, establish
    initial authenticator content and configuration, establish and enforce
    minimum password complexity and length, prohibit password reuse within
    a defined number of generations, change default authenticators before
    system deployment, set authenticator lifetimes, and protect
    authenticators commensurate with the security category of the
    information they protect.
  category: "authentication"
  source_doc: "nist_sp_800_53_rev5.pdf"

- query_id: "q005"
  query: "What does NIST SP 800-53 IR-4 require for incident handling?"
  ground_truth_answer: >
    IR-4 (Incident Handling) requires organizations to implement an
    incident handling capability that includes preparation, detection,
    analysis, containment, eradication, and recovery. It requires
    coordination of incident handling activities with contingency planning
    activities, and incorporation of lessons learned from ongoing incident
    handling activities into incident response procedures, training,
    and testing. Organizations must also track and document incidents
    throughout the handling process.
  category: "incident_response"
  source_doc: "nist_sp_800_53_rev5.pdf"

- query_id: "q006"
  query: "How does NIST SP 800-61 Rev 3 describe the incident response lifecycle in relation to the NIST CSF 2.0 functions?"
  ground_truth_answer: >
    NIST SP 800-61 Rev 3 (2025) proposes an incident response lifecycle
    model based on the six NIST CSF 2.0 Functions. All six functions play
    vital roles: Govern, Identify, and Protect support preparation and
    prevention activities, while Detect, Respond, and Recover are the
    operational response functions applied when an incident occurs. Lessons
    learned from incidents feed back into Govern, Identify, and Protect to
    continuously improve the organization's cybersecurity risk management.
  category: "incident_response"
  source_doc: "nist_sp_800_61r3.pdf"

- query_id: "q007"
  query: "What factors does NIST SP 800-61 recommend considering when selecting a containment strategy?"
  ground_truth_answer: >
    NIST SP 800-61 recommends weighing several factors when choosing a
    containment strategy: the potential for ongoing damage or theft of
    information; the need to preserve evidence; service availability
    requirements and the impact of taking systems offline; the time and
    resources needed to implement the strategy; the effectiveness of the
    strategy against the specific threat; and the expected duration of
    the solution. A short-term containment measure may be needed before
    a more permanent fix can be applied.
  category: "incident_response"
  source_doc: "nist_sp_800_61r3.pdf"

- query_id: "q008"
  query: "What key questions does the CISA incident response playbook say an organization should answer when scoping a cybersecurity incident?"
  ground_truth_answer: >
    The CISA incident response playbook identifies key scoping questions
    an organization must answer: What was the initial attack vector (how
    did the adversary gain initial access)? How is the adversary currently
    accessing the environment? Is the adversary exploiting vulnerabilities
    to achieve access or escalate privilege? How is the adversary
    maintaining command and control? Answering these questions establishes
    a common operating picture, drives the investigation, and enables
    prioritization of subsequent response activities.
  category: "incident_response"
  source_doc: "cisa_incident_response_playbooks.pdf"
