# Ingestion config for the cybersecurity standards corpus.
# Separate from configs/ingestion.yaml so the toy index is never overwritten.

chunk_size: 384          # tighter chunks suit dense standards prose
chunk_overlap: 64
similarity_top_k: 5
embed_model: "local"     # BAAI/bge-small-en-v1.5; switch to "openai" for higher recall

# Where the built index is persisted.
# Change this path if you want a fresh index without deleting the old one.
persist_dir: "data/index_cybersec"

# Directory containing your cybersecurity standard documents.
# Supported formats: .txt, .pdf, .md, .docx
data_dir: "data/corpus_cybersec"
